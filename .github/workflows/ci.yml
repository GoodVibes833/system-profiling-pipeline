name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (Jest + SuperTest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: coverage/
          retention-days: 7

  whatodo-unit:
    name: Whatodo Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        working-directory: apps/whatodo
      - run: npm test
        working-directory: apps/whatodo
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whatodo-unit-results
          path: apps/whatodo/coverage/
          retention-days: 7

  whatodo-e2e:
    name: Whatodo E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
        working-directory: apps/whatodo
      - run: npx playwright install --with-deps
        working-directory: apps/whatodo
      - run: npm run test:e2e
        working-directory: apps/whatodo
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whatodo-playwright-report
          path: apps/whatodo/playwright-report/
          retention-days: 7
